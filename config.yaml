# Processing settings
processing:
  fuzzy_match_threshold: 75
  badge_padding_length: 4
  min_quality_score: 60
  rolling_months: 12

# Column mappings for different data sources
column_mappings:
  summons:
    badge: ["BADGE_NUMBER", "Badge", "Badge Number", "Badge #"]
    officer: ["OFFICER_NAME", "Officer", "Officer Name", "Officer_Name"]
    violation: ["VIOLATION", "Violation", "Violation Code", "Statute"]
    date: ["DATE", "Date", "Issue Date", "Violation Date"]
    amount: ["AMOUNT", "Amount", "Fine", "Fine Amount"]
  
  assignment:
    badge: "PADDED_BADGE_NUMBER"
    first_name: "FIRST_NAME"
    last_name: "LAST_NAME"
    full_name: "FULL_NAME"
    division: "DIVISION"
    bureau: "BUREAU"

# Data validation rules
validation:
  required_columns:
    summons: ["BADGE_NUMBER", "OFFICER_NAME"]
    assignment: ["PADDED_BADGE_NUMBER", "FULL_NAME"]
  min_records: 10
  max_missing_percentage: 25

# Logging configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(levelname)s - %(message)s"
  file_path: "C:\\Users\\carucci_r\\OneDrive - City of Hackensack\\02_ETL_Scripts\\Logs"
  max_files: 10